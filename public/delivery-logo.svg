<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  
  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)"/>
  
  <!-- Cercle intérieur -->
  <circle cx="100" cy="100" r="85" fill="#fff" opacity="0.95"/>
  
  <!-- Boîte de livraison -->
  <rect x="55" y="60" width="90" height="75" rx="8" fill="url(#logoGradient)" stroke="#fff" stroke-width="3"/>
  
  <!-- Couvercle de la boîte -->
  <path d="M 55 75 Q 100 50 145 75" fill="#2563eb" stroke="#fff" stroke-width="2"/>
  
  <!-- Ruban -->
  <line x1="100" y1="60" x2="100" y2="130" stroke="#fbbf24" stroke-width="4"/>
  <line x1="70" y1="90" x2="130" y2="90" stroke="#fbbf24" stroke-width="4"/>
  
  <!-- Nœud -->
  <circle cx="100" cy="60" r="8" fill="#fbbf24"/>
  
  <!-- Nœud papillon décoration -->
  <ellipse cx="90" cy="55" rx="6" ry="8" fill="#fbbf24" transform="rotate(-30 90 55)"/>
  <ellipse cx="110" cy="55" rx="6" ry="8" fill="#fbbf24" transform="rotate(30 110 55)"/>
</svg>